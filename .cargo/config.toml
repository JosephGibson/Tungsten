# Arch Linux's system Rust package (rust 1:1.94.1) already routes linking through
# lld via x86_64-linux-gnu-gcc's built-in spec — no explicit linker flag needed here.
#
# If mold is later installed (pacman -S mold), replace the comment below with:
#   rustflags = ["-C", "link-arg=-fuse-ld=mold", "-C", "target-cpu=native"]
#
# target-cpu=native enables the full native instruction set (AVX2, FMA, etc.)
# on this machine. Non-portable binary — do not distribute to other hardware.
# Affects benchmark magnitudes; baselines in DECISIONS.md are keyed to this flag.
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
]

# Optional: uncomment to enable sccache (cargo install sccache / pacman -S sccache).
# Speeds up clean checkouts and branch switches by caching per-crate artifacts.
# [build]
# rustc-wrapper = "sccache"
